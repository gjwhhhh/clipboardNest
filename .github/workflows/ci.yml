name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src-mobile/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-mobile-tauri -> target

      - name: Install frontend dependencies
        working-directory: src-mobile
        run: npm ci

      - name: Run ESLint
        working-directory: src-mobile
        run: npm run lint

      - name: Run TypeScript check
        working-directory: src-mobile
        run: npm run type-check

      - name: Run Rust clippy
        run: cargo clippy --workspace

      - name: Check Rust formatting
        run: |
          cargo fmt --check || {
            echo "::warning::Rust formatting differs; skipping failure because CI only blocks errors."
          }

  test:
    name: 测试
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src-mobile/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-mobile-tauri -> target

      - name: Run Rust tests
        run: cargo test --workspace

  build-desktop:
    name: 构建桌面端 (${{ matrix.os }})
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            tauri_command: ../src-mobile/node_modules/.bin/tauri build --config ../.github/tauri-ci.config.json
            artifact_name: macos-bundle
            artifact_path: |
              target/release/bundle/macos/*.app
              target/release/bundle/dmg/*.dmg
          - os: windows-latest
            tauri_command: ../src-mobile/node_modules/.bin/tauri.cmd build --config ../.github/tauri-ci.config.json
            artifact_name: windows-bundle
            artifact_path: |
              target/release/bundle/msi/*.msi
              target/release/bundle/nsis/*.exe
          - os: ubuntu-22.04
            tauri_command: ../src-mobile/node_modules/.bin/tauri build --config ../.github/tauri-ci.config.json
            artifact_name: linux-bundle
            artifact_path: |
              target/release/bundle/deb/*.deb
              target/release/bundle/appimage/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src-mobile/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-mobile-tauri -> target

      - name: Install frontend dependencies
        working-directory: src-mobile
        run: npm ci

      - name: Build frontend
        working-directory: src-mobile
        run: npm run build

      - name: Build desktop app
        working-directory: src-mobile-tauri
        run: ${{ matrix.tauri_command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
