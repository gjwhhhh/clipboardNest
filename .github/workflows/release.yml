name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  create-release:
    name: 创建 Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-upload:
    name: 构建 (${{ matrix.os }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_script: npm run build:macos
            bundle_path: target/release/bundle/dmg/*.dmg
            asset_suffix: aarch64.dmg
          - os: windows-latest
            build_script: npm run build:windows
            bundle_path: target/release/bundle/nsis/*.exe
            asset_suffix: x64-setup.exe
          - os: ubuntu-22.04
            build_script: npm run build:linux
            bundle_path: target/release/bundle/deb/*.deb
            asset_suffix: amd64.deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app
        run: ${{ matrix.build_script }}

      - name: Normalize release asset name
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          matches=( ${{ matrix.bundle_path }} )
          shopt -u nullglob

          if [ "${#matches[@]}" -ne 1 ]; then
            echo "Expected exactly one bundle for pattern '${{ matrix.bundle_path }}', found ${#matches[@]}"
            printf '%s\n' "${matches[@]}"
            exit 1
          fi

          version="${GITHUB_REF_NAME#v}"
          mkdir -p release-assets
          cp "${matches[0]}" "release-assets/ClipboardNest_${version}_${{ matrix.asset_suffix }}"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
