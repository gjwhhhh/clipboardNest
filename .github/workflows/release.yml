name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    name: 创建 Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-upload:
    name: 构建 (${{ matrix.os }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            tauri_command: ../src-mobile/node_modules/.bin/tauri build --config ../.github/tauri-ci.config.json
            artifact_name: ClipboardManager_macOS
            artifact_ext: .dmg
            bundle_path: target/release/bundle/dmg/*.dmg
          - os: windows-latest
            tauri_command: ../src-mobile/node_modules/.bin/tauri.cmd build --config ../.github/tauri-ci.config.json
            artifact_name: ClipboardManager_Windows
            artifact_ext: .msi
            bundle_path: target/release/bundle/msi/*.msi
          - os: ubuntu-22.04
            tauri_command: ../src-mobile/node_modules/.bin/tauri build --config ../.github/tauri-ci.config.json
            artifact_name: ClipboardManager_Linux
            artifact_ext: .deb
            bundle_path: target/release/bundle/deb/*.deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src-mobile/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-mobile-tauri -> target

      - name: Install frontend dependencies
        working-directory: src-mobile
        run: npm ci

      - name: Build frontend
        working-directory: src-mobile
        run: npm run build

      - name: Build desktop app
        working-directory: src-mobile-tauri
        run: ${{ matrix.tauri_command }}

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.bundle_path }}
          asset_name: ${{ matrix.artifact_name }}_${{ steps.version.outputs.VERSION }}${{ matrix.artifact_ext }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
